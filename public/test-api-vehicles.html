<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Véhicules CTRACK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            flex: 1;
            min-width: 200px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .response-container {
            margin-top: 20px;
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .response-header h3 {
            color: #333;
            font-size: 18px;
        }

        .copy-btn {
            padding: 6px 12px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            min-width: auto;
            flex: none;
        }

        .copy-btn:hover {
            background: #059669;
        }

        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.6;
            max-height: 600px;
            overflow-y: auto;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            padding: 20px;
        }

        .error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .success {
            background: #d1fae5;
            border: 1px solid #a7f3d0;
            color: #065f46;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card .label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Test API Véhicules CTRACK</h1>

        <div class="card">
            <h2 style="margin-bottom: 20px; color: #333;">Endpoints de test disponibles</h2>
            
            <div class="button-group">
                <button onclick="testDebugEndpoint()">
                    🔍 Debug Complet (/api/vehicles/debug)
                </button>
                <button onclick="testCtrackEndpoint()">
                    🎯 Test CTRACK Direct (/api/vehicles/test-ctrack)
                </button>
                <button onclick="clearResponse()">
                    🗑️ Effacer
                </button>
            </div>

            <div id="loading" class="loading" style="display: none;">
                ⏳ Chargement en cours...
            </div>

            <div id="stats" class="stats" style="display: none;"></div>

            <div id="response" class="response-container" style="display: none;">
                <div class="response-header">
                    <h3>📄 Réponse de l'API</h3>
                    <button class="copy-btn" onclick="copyResponse()">📋 Copier</button>
                </div>
                <pre id="response-content"></pre>
            </div>
        </div>
    </div>

    <script>
        const baseUrl = window.location.origin;

        async function makeRequest(endpoint) {
            const loading = document.getElementById('loading');
            const response = document.getElementById('response');
            const responseContent = document.getElementById('response-content');
            const statsDiv = document.getElementById('stats');

            loading.style.display = 'block';
            response.style.display = 'none';
            statsDiv.style.display = 'none';

            try {
                const res = await fetch(`${baseUrl}${endpoint}`, {
                    headers: {
                        'Accept': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    credentials: 'include'
                });

                const data = await res.json();
                
                loading.style.display = 'none';
                response.style.display = 'block';
                responseContent.textContent = JSON.stringify(data, null, 2);

                // Show stats if available
                if (data.success) {
                    showStats(data);
                }

            } catch (error) {
                loading.style.display = 'none';
                response.style.display = 'block';
                responseContent.textContent = `Erreur: ${error.message}`;
            }
        }

        function showStats(data) {
            const statsDiv = document.getElementById('stats');
            let statsHtml = '';

            if (data.vehicles_count !== undefined) {
                statsHtml += `
                    <div class="stat-card">
                        <div class="label">Véhicules retournés</div>
                        <div class="value">${data.vehicles_count}</div>
                    </div>
                `;
            }

            if (data.total_vehicles !== undefined) {
                statsHtml += `
                    <div class="stat-card">
                        <div class="label">Total véhicules CTRACK</div>
                        <div class="value">${data.total_vehicles}</div>
                    </div>
                `;
            }

            if (data.filtered_vehicles !== undefined) {
                statsHtml += `
                    <div class="stat-card">
                        <div class="label">Véhicules filtrés</div>
                        <div class="value">${data.filtered_vehicles}</div>
                    </div>
                `;
            }

            if (data.platforms && data.platforms.length > 0) {
                statsHtml += `
                    <div class="stat-card">
                        <div class="label">Plateformes actives</div>
                        <div class="value">${data.platforms.length}</div>
                    </div>
                `;
            }

            if (statsHtml) {
                statsDiv.innerHTML = statsHtml;
                statsDiv.style.display = 'grid';
            }
        }

        async function testDebugEndpoint() {
            await makeRequest('/api/vehicles/debug');
        }

        async function testCtrackEndpoint() {
            await makeRequest('/api/vehicles/test-ctrack');
        }

        function clearResponse() {
            document.getElementById('response').style.display = 'none';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('response-content').textContent = '';
        }

        function copyResponse() {
            const content = document.getElementById('response-content').textContent;
            navigator.clipboard.writeText(content).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✓ Copié !';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }
    </script>
</body>
</html>
